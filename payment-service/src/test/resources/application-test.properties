# Test profile - uses H2 in-memory database instead of MySQL
spring.application.name=payment-service

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

# Disable RabbitMQ in tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# Stripe test values
stripe.api.key=sk_test_fake_key_for_integration_tests
stripe.webhook.secret=whsec_fake_secret_for_tests
stripe.success.url=http://localhost:5173/payment/success
stripe.cancel.url=http://localhost:5173/cart

# Disable tracing in tests
management.tracing.sampling.probability=0
