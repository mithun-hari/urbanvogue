server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: auth-service
            uri: http://localhost:8082
            predicates:
              - Path=/api/auth/**

          - id: product-service
            uri: http://localhost:8083
            predicates:
              - Path=/api/products/**

          - id: order-service
            uri: http://localhost:8085
            predicates:
              - Path=/orders/**

          - id: inventory-service
            uri: http://localhost:8086
            predicates:
              - Path=/api/inventory/**

          - id: payment-service
            uri: http://localhost:8087
            predicates:
              - Path=/payments/**

          - id: notification-service
            uri: http://localhost:8088
            predicates:
              - Path=/api/notifications/**
